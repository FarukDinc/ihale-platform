name: EKAP Scraper + Bildirimler

on:
  schedule:
    - cron: '0 2 * * *'   # Her gece saat 05:00 TR (UTC+3 = UTC 02:00)
  workflow_dispatch:        # Manuel tetikleme

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları yükle
        run: |
          pip install playwright supabase pycryptodome requests
          playwright install chromium
          playwright install-deps

      - name: EKAP Scraper çalıştır
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          EKAP_USERNAME: ${{ secrets.EKAP_USERNAME }}
          EKAP_PASSWORD: ${{ secrets.EKAP_PASSWORD }}
          EKAP_BELGE_INDIR: "1"
        run: python backend/ekap_scraper.py

      - name: Bildirim e-postaları gönder
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python backend/notify.py
