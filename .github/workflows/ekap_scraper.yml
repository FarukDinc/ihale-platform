name: EKAP Scraper + Bildirimler

# NOT (10 Tem 2026): Otomatik zamanlama KAPATILDI — VDS cron (195.85.207.126,
# /opt/ihale-platform/backend/run_scraper.sh, 02:00 UTC) bu işi devraldı.
# Bu workflow artık sadece manuel tetiklenebilir (yedek/acil durum).
on:
  workflow_dispatch:        # Manuel tetikleme

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları yükle
        run: pip install httpx supabase pycryptodome google-genai pillow numpy

      - name: EKAP Scraper çalıştır
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Gece turu: sadece EKAP indirme linki saklanır (hafif, hızlı).
          # Ağır indirme (Gemini CAPTCHA + Storage) ileride müşteri başına ayrı tetiklenecek:
          #   EKAP_BELGE_INDIR: "1"
          EKAP_BELGE_LINK: "1"
        run: python backend/ekap_scraper.py

      - name: Bildirim e-postaları gönder
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python backend/notify.py
