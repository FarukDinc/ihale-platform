services:

  # ── API Servisi ──────────────────────────────────────────
  - type: web
    name: ihale-api
    runtime: python
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      playwright install chromium
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    plan: free

    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: IYZICO_API_KEY
        sync: false
      - key: IYZICO_SECRET_KEY
        sync: false
      - key: IYZICO_BASE_URL
        sync: false
      - key: PROXY_KULLANICI
        sync: false
      - key: PROXY_SIFRE
        sync: false

  # ── Worker (Cron) ────────────────────────────────────────
