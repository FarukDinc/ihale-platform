services:

  # ── API Servisi ──────────────────────────────────────────
  - type: web
    name: ihale-api
    runtime: python
    rootDir: backend
    pythonVersion: "3.11.4"
    buildCommand: |
      pip install -r requirements.txt
      playwright install chromium
      playwright install-deps chromium
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    plan: free

    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false

  # ── Worker (Cron) ────────────────────────────────────────
  - type: worker
    name: ihale-worker
    runtime: python
    rootDir: backend
    pythonVersion: "3.11.4"
    buildCommand: |
      pip install -r requirements.txt
      playwright install chromium
      playwright install-deps chromium
    startCommand: python worker.py cron
    plan: starter

    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
