<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- İhaleGlobal favicon: navy kare + amber "İ" (İhale) + kazanan/onay tık işareti.
       16px'te de okunacak şekilde büyük ve kalın öğeler. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E3358"/>
      <stop offset="1" stop-color="#0A1628"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="15" fill="url(#bg)"/>
  <!-- İ harfinin noktası -->
  <circle cx="21" cy="14" r="4.3" fill="#F0A500"/>
  <!-- İ gövdesi -->
  <rect x="16.7" y="21.5" width="8.6" height="28.5" rx="2.5" fill="#F0A500"/>
  <!-- kazanan/onay tık işareti -->
  <path d="M31 35 l8 8 l14 -17" fill="none" stroke="#F0A500" stroke-width="7"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
