<!--
  ÖDEME SAYFASI EKİ
  fiyatlandirma.html'deki mevcut plan kartlarının altına,
  veya modal olarak kullan.
  
  İyzico gereksinimleri:
  - Mastercard, Visa, Visa Electron logoları ✅
  - SSL güvenlik ifadesi ✅
  - iyzico ile ödeme ifadesi ✅
  - Mesafeli satış sözleşmesi onay kutusu ✅
-->

<!-- ÖDEME MODAL -->
<div id="odeme-modal" style="
    display: none;
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.5);
    align-items: center; justify-content: center;
">
    <div style="
        background: white; border-radius: 16px;
        padding: 32px; width: 100%; max-width: 480px;
        margin: 16px; max-height: 90vh; overflow-y: auto;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    ">
        <!-- Başlık -->
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
            <div>
                <div style="font-size:20px;font-weight:700;color:#0A1628" id="modal-plan-adi">Standart Plan</div>
                <div style="font-size:14px;color:#64748b;margin-top:4px" id="modal-fiyat">1.490 TL/ay — 50 Kredi</div>
            </div>
            <button id="modal-kapat" style="
                background:none;border:none;font-size:22px;cursor:pointer;
                color:#94a3b8;padding:4px;
            ">✕</button>
        </div>

        <!-- Kart Logoları -->
        <div style="
            display: flex; gap: 8px; align-items: center;
            margin-bottom: 20px; padding: 12px;
            background: #f8fafc; border-radius: 8px;
        ">
            <span style="font-size:12px;color:#64748b;margin-right:4px">Kabul edilen kartlar:</span>
            <!-- Visa -->
            <div style="background:#1A1F71;color:white;padding:3px 8px;
                        border-radius:4px;font-size:11px;font-weight:900;
                        font-style:italic;letter-spacing:-0.5px">
                VISA
            </div>
            <!-- Mastercard -->
            <div style="display:flex;align-items:center;gap:-4px">
                <div style="width:18px;height:18px;background:#EB001B;
                            border-radius:50%;margin-right:-6px;z-index:1"></div>
                <div style="width:18px;height:18px;background:#F79E1B;
                            border-radius:50%"></div>
            </div>
            <span style="font-size:10px;color:#64748b;margin-left:2px">Mastercard</span>
            <!-- iyzico -->
            <div style="margin-left:auto;display:flex;align-items:center;gap:4px">
                <span style="font-size:10px;color:#94a3b8">Güvenli ödeme:</span>
                <span style="font-size:12px;font-weight:700;color:#1a73e8">iyzico</span>
            </div>
        </div>

        <!-- Kart Formu -->
        <form id="odeme-form">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
                <div>
                    <label style="font-size:12px;font-weight:600;color:#374151;
                                  display:block;margin-bottom:4px">Ad *</label>
                    <input id="kart-ad" type="text" placeholder="Ad" required style="
                        width:100%;padding:10px 12px;border:1px solid #e2e8f0;
                        border-radius:8px;font-size:14px;box-sizing:border-box;outline:none;
                    ">
                </div>
                <div>
                    <label style="font-size:12px;font-weight:600;color:#374151;
                                  display:block;margin-bottom:4px">Soyad *</label>
                    <input id="kart-soyad" type="text" placeholder="Soyad" required style="
                        width:100%;padding:10px 12px;border:1px solid #e2e8f0;
                        border-radius:8px;font-size:14px;box-sizing:border-box;outline:none;
                    ">
                </div>
            </div>

            <div style="margin-bottom:12px">
                <label style="font-size:12px;font-weight:600;color:#374151;
                              display:block;margin-bottom:4px">Kart Numarası *</label>
                <input id="kart-no" type="text" placeholder="0000 0000 0000 0000"
                    maxlength="19" required style="
                    width:100%;padding:10px 12px;border:1px solid #e2e8f0;
                    border-radius:8px;font-size:14px;box-sizing:border-box;
                    outline:none;font-family:monospace;letter-spacing:1px;
                ">
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px">
                <div>
                    <label style="font-size:12px;font-weight:600;color:#374151;
                                  display:block;margin-bottom:4px">Ay *</label>
                    <input id="kart-ay" type="text" placeholder="MM" maxlength="2"
                        required style="
                        width:100%;padding:10px 12px;border:1px solid #e2e8f0;
                        border-radius:8px;font-size:14px;box-sizing:border-box;
                        outline:none;text-align:center;
                    ">
                </div>
                <div>
                    <label style="font-size:12px;font-weight:600;color:#374151;
                                  display:block;margin-bottom:4px">Yıl *</label>
                    <input id="kart-yil" type="text" placeholder="YY" maxlength="4"
                        required style="
                        width:100%;padding:10px 12px;border:1px solid #e2e8f0;
                        border-radius:8px;font-size:14px;box-sizing:border-box;
                        outline:none;text-align:center;
                    ">
                </div>
                <div>
                    <label style="font-size:12px;font-weight:600;color:#374151;
                                  display:block;margin-bottom:4px">CVV *</label>
                    <input id="kart-cvc" type="text" placeholder="***" maxlength="4"
                        required style="
                        width:100%;padding:10px 12px;border:1px solid #e2e8f0;
                        border-radius:8px;font-size:14px;box-sizing:border-box;
                        outline:none;text-align:center;
                    ">
                </div>
            </div>

            <div style="margin-bottom:20px">
                <label style="font-size:12px;font-weight:600;color:#374151;
                              display:block;margin-bottom:4px">Taksit</label>
                <select id="taksit" style="
                    width:100%;padding:10px 12px;border:1px solid #e2e8f0;
                    border-radius:8px;font-size:14px;outline:none;
                ">
                    <option value="1">Tek Çekim</option>
                    <option value="2">2 Taksit</option>
                    <option value="3">3 Taksit</option>
                </select>
            </div>

            <!-- Sözleşme onay — İyzico zorunluluğu -->
            <div style="margin-bottom:20px;display:flex;align-items:flex-start;gap:10px">
                <input type="checkbox" id="sozlesme-onay" required
                    style="margin-top:3px;width:16px;height:16px;flex-shrink:0">
                <label for="sozlesme-onay" style="font-size:12px;color:#475569;line-height:1.5">
                    <a href="/mesafeli-satis.html" target="_blank"
                       style="color:#0A1628;font-weight:600">Mesafeli Satış Sözleşmesi</a>'ni ve
                    <a href="/kullanim-kosullari.html" target="_blank"
                       style="color:#0A1628;font-weight:600">Kullanım Koşulları</a>'nı
                    okudum, kabul ediyorum.
                </label>
            </div>

            <!-- Ödeme butonu -->
            <button type="submit" id="odeme-btn" style="
                width:100%;padding:14px;background:#0A1628;color:white;
                border:none;border-radius:10px;font-size:15px;font-weight:700;
                cursor:pointer;transition:opacity 0.2s;
            ">
                🔒 Güvenli Ödeme Yap
            </button>

            <!-- Güvenlik notu -->
            <div style="
                text-align:center;margin-top:14px;
                font-size:11px;color:#94a3b8;
                display:flex;align-items:center;justify-content:center;gap:6px;
            ">
                <span>🔒</span>
                <span>256-bit SSL şifreleme ile korunmaktadır.</span>
                <span style="font-weight:700;color:#1a73e8">iyzico</span>
                <span>güvencesiyle işlenir.</span>
            </div>
        </form>
    </div>
</div>
