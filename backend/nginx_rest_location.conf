# İhaleGlobal — /rest/v1/ için hız limitli location (VDS'te /etc/nginx/snippets/ihale-rest-ratelimit.conf).
# ihale-locations.conf bunu include eder. `^~` prefix'i, genel `location ~ ^/(rest|auth|...)` regex'inden
# ÖNCE kazanır (nginx: ^~ eşleşince regex'lere hiç bakılmaz) → yalnız /rest/v1/ limitlenir; auth/storage/
# realtime aynen genel bloktan akar. Proxy direktifleri genel blokla birebir aynı (davranış farkı yok).
# Zone tanımı: /etc/nginx/conf.d/ihale-ratelimit.conf (ihale_rest, 2r/s, CF-Connecting-IP anahtarlı).
location ^~ /rest/v1/ {
    limit_req zone=ihale_rest burst=60 nodelay;
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}
