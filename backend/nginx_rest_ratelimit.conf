# ============================================================================
# İhaleGlobal — /rest/v1/* hız limiti (16 Tem 2026, veri-koruma paketi 2/2)
#
# Amaç: anon key sayfa kaynağında olduğundan PostgREST'ten 1000'er satırlık
# sayfalamayla tüm tabloların kopyalanması mümkündü. Bu limit toplu çekimi
# yavaşlatır/görünür kılar (356K ilan ≈ 356 istek → sürekli 2 istek/sn tavanına
# takılır, access log'da 429'larla iz bırakır). Normal kullanım etkilenmez:
# sayfa açılışı ~3-10 istek (burst 60 anında karşılar), insan sürekli 2/sn üretmez.
#
# Anahtar: CF-Connecting-IP (origin yalnız Cloudflare'den erişilir — DOCKER-USER
# kuralları, bkz. harden_origin.sh — bu yüzden header güvenilir). Header yoksa
# (doğrudan erişim denemeleri) remote_addr'a düşer.
# Scraper'lar ETKİLENMEZ: backend/.env SUPABASE_URL=localhost:8000 (Kong direkt,
# nginx'e hiç uğramaz — 16 Tem doğrulandı).
#
# KURULUM (VDS):
#   cp backend/nginx_rest_ratelimit.conf /etc/nginx/conf.d/ihale-ratelimit.conf   # http{} bağlamı (zone)
#   /etc/nginx/snippets/ihale-locations.conf içine location bloğu (deploy notu:
#   YAPILACAKLAR.md) + nginx -t && systemctl reload nginx
# GERİ ALMA: iki dosyadan ilgili satırları sil + reload.
# ============================================================================

map $http_cf_connecting_ip $ihale_api_istemci {
    ""      $binary_remote_addr;
    default $http_cf_connecting_ip;
}

limit_req_zone $ihale_api_istemci zone=ihale_rest:20m rate=2r/s;
limit_req_log_level warn;
limit_req_status 429;
