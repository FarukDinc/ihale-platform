<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sayfa Bulunamadı — İhaleGlobal</title>
  <link rel="stylesheet" href="css/style.css?v=mob1" />
  <script src="js/theme.js?v=6"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      background: var(--navy);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .wrap { max-width: 480px; }
    .code {
      font-family: var(--font-display);
      font-size: 96px;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--amber), #C98A00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    p { font-size: 15px; color: var(--muted); line-height: 1.7; margin-bottom: 32px; }
    .btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-back {
      background: var(--amber); color: var(--navy);
      padding: 11px 24px; border-radius: var(--radius-sm);
      font-weight: 700; font-size: 14px; text-decoration: none;
      transition: opacity .15s;
    }
    .btn-back:hover { opacity: .85; }
    .btn-home {
      background: var(--card-bg); color: var(--white);
      border: 1px solid var(--border);
      padding: 11px 24px; border-radius: var(--radius-sm);
      font-weight: 600; font-size: 14px; text-decoration: none;
      transition: border-color .15s;
    }
    .btn-home:hover { border-color: rgba(var(--overlay-rgb),.3); }
    .quick-links {
      margin-top: 40px; padding-top: 28px;
      border-top: 1px solid var(--border);
      display: flex; gap: 24px; justify-content: center; flex-wrap: wrap;
    }
    .quick-links a {
      font-size: 13px; color: var(--muted); text-decoration: none;
      transition: color .15s;
    }
    .quick-links a:hover { color: var(--amber); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Sayfa bulunamadı</h1>
    <p>Aradığınız sayfa taşınmış, silinmiş ya da hiç var olmamış olabilir.<br>Aşağıdaki bağlantılardan devam edebilirsiniz.</p>
    <div class="btns">
      <a href="dashboard" class="btn-back">Anasayfa'ya Dön</a>
      <a href="javascript:history.back()" class="btn-home">← Geri Git</a>
    </div>
    <div class="quick-links">
      <a href="ihaleler">İhaleler</a>
      <a href="takipte">Takip Listem</a>
      <a href="profil">Profil</a>
      <a href="bildirimler">Bildirimler</a>
    </div>
  </div>
</body>
</html>
