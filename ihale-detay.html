<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>İhale Detay — İhalePlatform</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body { background: var(--navy); }
    .app { display: flex; min-height: 100vh; }

    /* SIDEBAR */
    .sidebar {
      background: var(--navy-mid); border-right: 1px solid var(--border);
      width: 240px; flex-shrink: 0; position: sticky; top: 0;
      height: 100vh; display: flex; flex-direction: column; overflow-y: auto;
    }
    .sidebar-logo { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); }
    .sidebar-logo a {
      font-family: var(--font-display); font-size: 18px; font-weight: 800;
      color: var(--white); text-decoration: none; display: flex; align-items: center; gap: 8px;
    }
    .sidebar-logo span { color: var(--amber); }
    .sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
    .nav-section-label {
      font-size: 10px; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--muted); padding: 12px 8px 6px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 9px 12px;
      border-radius: 6px; color: var(--muted); text-decoration: none;
      font-size: 13px; font-weight: 500; transition: all .15s; margin-bottom: 2px;
    }
    .nav-item:hover { background: var(--card-bg); color: var(--white); }
    .nav-item.active { background: rgba(240,165,0,0.12); color: var(--amber); }
    .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
    .nav-badge {
      margin-left: auto; background: var(--amber); color: var(--navy);
      font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 10px;
    }
    .sidebar-footer { padding: 16px; border-top: 1px solid var(--border); }
    .user-row { display: flex; align-items: center; gap: 10px; }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--amber); color: var(--navy);
      font-size: 12px; font-weight: 800; display: flex; align-items: center; justify-content: center;
    }
    .user-name { font-size: 13px; font-weight: 600; color: var(--white); }
    .user-plan { font-size: 11px; color: var(--muted); }

    /* MAIN */
    .main { display: flex; flex-direction: column; flex: 1; min-width: 0; height: 100vh; overflow-y: auto; }

    /* TOPBAR */
    .topbar {
      background: var(--navy-mid); border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 56px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 10;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .back-btn {
      display: flex; align-items: center; gap: 6px; color: var(--muted);
      text-decoration: none; font-size: 13px; font-weight: 500; transition: color .15s;
    }
    .back-btn:hover { color: var(--white); }
    .breadcrumb { font-size: 13px; color: var(--muted); }
    .breadcrumb span { color: var(--white); }
    .btn-primary {
      background: var(--amber); color: var(--navy); border: none;
      padding: 8px 16px; border-radius: 6px; font-size: 13px;
      font-weight: 700; cursor: pointer; text-decoration: none;
    }

    /* PAGE BODY */
    .page-body { padding: 28px; max-width: 1000px; }

    /* LOADING */
    .loading-state { text-align: center; padding: 80px; color: var(--muted); }
    .loading-spinner {
      width: 32px; height: 32px; border: 3px solid var(--border);
      border-top-color: var(--amber); border-radius: 50%;
      animation: spin .8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }

    /* DETAY HEADER */
    .detay-header {
      background: var(--navy-mid); border: 1px solid var(--border);
      border-radius: 12px; padding: 28px; margin-bottom: 20px;
    }
    .detay-eyebrow {
      font-size: 11px; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--amber); margin-bottom: 10px;
    }
    .detay-baslik { font-size: 22px; font-weight: 800; color: var(--white); line-height: 1.3; margin-bottom: 12px; }
    .detay-idare { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
    .detay-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
    .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
    .badge-open { background: rgba(34,197,94,0.12); color: #4ade80; }
    .badge-soon { background: rgba(245,158,11,0.12); color: var(--amber); }
    .badge-closed { background: rgba(239,68,68,0.1); color: #f87171; }
    .badge-tur { background: rgba(99,102,241,0.12); color: #a5b4fc; }
    .badge-usul { background: rgba(255,255,255,0.06); color: var(--muted); }

    .detay-actions { display: flex; gap: 10px; }
    .btn-takip {
      padding: 10px 24px; border-radius: 7px; font-size: 14px; font-weight: 700;
      background: var(--amber); color: var(--navy); border: none; cursor: pointer; transition: all .2s;
    }
    .btn-takip:hover { background: var(--amber-dim); transform: translateY(-1px); }
    .btn-ekap {
      padding: 10px 20px; border-radius: 7px; font-size: 14px; font-weight: 600;
      background: transparent; color: var(--white); border: 1px solid var(--border); cursor: pointer;
      text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: all .2s;
    }
    .btn-ekap:hover { border-color: rgba(255,255,255,.4); background: rgba(255,255,255,.04); }

    /* KPI GRID */
    .kpi-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px;
    }
    .kpi-card {
      background: var(--navy-mid); border: 1px solid var(--border);
      border-radius: 10px; padding: 20px;
    }
    .kpi-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
    .kpi-value { font-size: 22px; font-weight: 800; color: var(--white); }
    .kpi-value.amber { color: var(--amber); }
    .kpi-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* TABS */
    .tabs {
      display: flex; gap: 4px; border-bottom: 1px solid var(--border);
      margin-bottom: 20px; flex-wrap: wrap;
    }
    .tab-btn {
      padding: 12px 20px; font-size: 14px; font-weight: 600; color: var(--muted);
      background: none; border: none; border-bottom: 2px solid transparent;
      cursor: pointer; transition: all .15s; margin-bottom: -1px;
    }
    .tab-btn:hover { color: var(--white); }
    .tab-btn.active { color: var(--amber); border-bottom-color: var(--amber); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* İLAN METNİ */
    .ilan-metni {
      font-size: 14px; color: var(--off-white); line-height: 1.9;
      white-space: pre-wrap; word-break: break-word;
    }

    /* BELGELER */
    .belge-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 16px; border-radius: 8px; background: rgba(255,255,255,.03);
      border: 1px solid var(--border); margin-bottom: 10px;
    }
    .belge-info { display: flex; align-items: center; gap: 12px; }
    .belge-icon { font-size: 22px; }
    .belge-ad { font-size: 13px; font-weight: 600; color: var(--white); }
    .belge-tarih { font-size: 11px; color: var(--muted); }

    /* DETAY GRID */
    .detay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }

    .detay-card {
      background: var(--navy-mid); border: 1px solid var(--border);
      border-radius: 10px; padding: 24px;
    }
    .detay-card.full { grid-column: 1 / -1; }
    .card-title {
      font-size: 13px; font-weight: 700; color: var(--white);
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: 16px;
      padding-bottom: 12px; border-bottom: 1px solid var(--border);
    }

    .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,.04); }
    .info-row:last-child { border-bottom: none; }
    .info-label { font-size: 13px; color: var(--muted); }
    .info-value { font-size: 13px; color: var(--white); font-weight: 600; text-align: right; max-width: 60%; }

    /* UYUM SKORU */
    .uyum-section { margin-bottom: 20px; }
    .uyum-bar-wrap {
      background: var(--navy-mid); border: 1px solid var(--border);
      border-radius: 10px; padding: 24px;
    }
    .uyum-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .uyum-score { font-size: 36px; font-weight: 800; color: var(--amber); }
    .uyum-label { font-size: 13px; color: var(--muted); }
    .uyum-track { background: var(--border); height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 16px; }
    .uyum-fill { height: 100%; background: linear-gradient(90deg, var(--amber-dim), var(--amber)); border-radius: 4px; transition: width 1s ease; }
    .uyum-tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .uyum-tag {
      padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: 600;
      background: rgba(240,165,0,0.1); color: var(--amber); border: 1px solid rgba(240,165,0,0.2);
    }

    /* AÇIKLAMA */
    .aciklama-text {
      font-size: 14px; color: var(--off-white); line-height: 1.8;
      white-space: pre-wrap;
    }

    /* BENZER İHALELER */
    .benzer-list { display: flex; flex-direction: column; gap: 10px; }
    .benzer-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px; border-radius: 7px; background: rgba(255,255,255,.03);
      border: 1px solid var(--border); text-decoration: none; transition: all .15s;
    }
    .benzer-item:hover { border-color: var(--amber); background: rgba(240,165,0,.04); }
    .benzer-baslik { font-size: 13px; font-weight: 600; color: var(--white); margin-bottom: 3px; }
    .benzer-meta { font-size: 11px; color: var(--muted); }
    .benzer-bedel { font-size: 13px; font-weight: 700; color: var(--amber); white-space: nowrap; }
  </style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <a href="/">
        <span style="width:6px;height:6px;background:var(--amber);border-radius:50%;display:inline-block;animation:pulse 2s infinite;"></span>
        İhale<span>Platform</span>
      </a>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Genel</div>
      <a href="dashboard" class="nav-item"><span class="icon">◉</span> Dashboard</a>
      <a href="ihaleler" class="nav-item active"><span class="icon">⊞</span> İhaleler</a>
      <a href="#" class="nav-item"><span class="icon">☆</span> Takipte</a>
      <a href="#" class="nav-item"><span class="icon">🔔</span> Bildirimler <span class="nav-badge">4</span></a>
      <div class="nav-section-label">Analiz</div>
      <a href="#" class="nav-item"><span class="icon">📊</span> Rekabet Analizi</a>
      <a href="#" class="nav-item"><span class="icon">✓</span> Uyumluluk</a>
      <a href="#" class="nav-item"><span class="icon">📁</span> Dökümanlar</a>
      <div class="nav-section-label">Ayarlar</div>
      <a href="profil" class="nav-item"><span class="icon">⚙</span> Profil & Filtreler</a>
      <a href="fiyatlandirma_odeme_bolumu" class="nav-item"><span class="icon">💳</span> Abonelik</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-row">
        <div class="user-avatar">FD</div>
        <div class="user-info">
          <div class="user-name">Faruk D.</div>
          <div class="user-plan">Ücretsiz Plan</div>
        </div>
        <span style="color:var(--muted);font-size:12px;">⋮</span>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <div class="topbar-left">
        <a class="back-btn" href="ihaleler">← Geri</a>
        <div class="breadcrumb">İhaleler / <span id="bc-baslik">Yükleniyor...</span></div>
      </div>
      <div style="display:flex; gap:10px; align-items:center;">
        <button class="btn-takip" id="topbar-takip" onclick="takibeAl()">☆ Takibe Al</button>
        <a href="/" class="btn-primary">Pro'ya Geç ↑</a>
      </div>
    </div>

    <!-- PAGE BODY -->
    <div class="page-body" id="page-content">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        İhale yükleniyor...
      </div>
    </div>

  </div><!-- /main -->
</div><!-- /app -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/api.js"></script>
<script src="js/uyum.js"></script>
<script>
  const SUPABASE_URL = "https://lpgelwfoarhouollhwur.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxwZ2Vsd2ZvYXJob3VvbGxod3VyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMzI4MjAsImV4cCI6MjA5NzgwODgyMH0.GqTZkeoOAomuur4JSyW2pTR-8Zzg8OTv394JtP7DoXM";
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // URL'den id al
  const params = new URLSearchParams(window.location.search);
  const ihaleId = params.get('id');

  function tarihFormatla(t) {
    if (!t) return '—';
    const d = new Date(t);
    const aylar = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
    return `${d.getDate()} ${aylar[d.getMonth()]} ${d.getFullYear()}`;
  }

  function butceFormatla(b) {
    if (!b) return '—';
    if (b >= 1000000) return `₺${(b/1000000).toFixed(2)}M`;
    if (b >= 1000) return `₺${(b/1000).toFixed(0)}K`;
    return `₺${b.toLocaleString('tr')}`;
  }

  // Yaklaşık maliyet aralığı (itiraz bedeli eşiklerinden)
  function yaklasikMaliyet(d) {
    const mn = d.yaklasik_maliyet_min, mx = d.yaklasik_maliyet_max;
    if (mn == null && mx == null) return '—';
    if (mn === 0 && mx) return `${butceFormatla(mx)} altı`;
    if (mn && mx == null) return `${butceFormatla(mn)} üzeri`;
    if (mn != null && mx != null) return `${butceFormatla(mn)} – ${butceFormatla(mx)}`;
    return '—';
  }

  function itirazFormatla(b) {
    if (!b) return '—';
    return `₺${Number(b).toLocaleString('tr')}`;
  }

  // İKN'den (2026/1102593) EKAP detay linki üret
  function ekapLink(ikn) {
    if (!ikn || !ikn.includes('/')) return 'https://ekap.kik.gov.tr';
    const [yil, sayi] = ikn.split('/');
    return `https://ekapv2.kik.gov.tr/ekap/ihale-detay/${yil}/${sayi}`;
  }

  function gunHesapla(bitis) {
    if (!bitis) return null;
    return Math.ceil((new Date(bitis) - new Date()) / 86400000);
  }

  function durumBadge(durum, bitis) {
    const gun = gunHesapla(bitis);
    if (gun !== null && gun <= 3 && gun >= 0) return `<span class="badge badge-soon">● Son ${gun} Gün</span>`;
    if (gun !== null && gun < 0) return `<span class="badge badge-closed">● Kapandı</span>`;
    if (durum === 'aktif') return `<span class="badge badge-open">● Açık</span>`;
    return `<span class="badge badge-closed">● ${durum}</span>`;
  }

  let mevcutIhale = null;
  let takipte = false;
  let kullaniciProfil = null;

  async function ihaleYukle() {
    if (!ihaleId) {
      document.getElementById('page-content').innerHTML = `
        <div class="loading-state">⚠ İhale bulunamadı. <a href="ihaleler" style="color:var(--amber);">Geri dön</a></div>`;
      return;
    }

    const { data, error } = await sb
      .from('ilanlar')
      .select('*')
      .eq('id', ihaleId)
      .single();

    if (error || !data) {
      document.getElementById('page-content').innerHTML = `
        <div class="loading-state">⚠ İhale bulunamadı. <a href="ihaleler" style="color:var(--amber);">Listeye dön</a></div>`;
      return;
    }

    mevcutIhale = data;
    kullaniciProfil = await Uyum.profilCek(sb);
    sayfaOlustur(data);
    benzerIhaleler(data);
  }

  function sekmeAc(ev, panelId) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    ev.currentTarget.classList.add('active');
    document.getElementById(panelId).classList.add('active');
  }

  function sayfaOlustur(d) {
    const uyum = Uyum.hesapla(d, kullaniciProfil);
    const gun = gunHesapla(d.son_teklif_tarihi);
    const belgeler = Array.isArray(d.belgeler) ? d.belgeler : [];

    document.title = `${d.baslik} — İhalePlatform`;
    document.getElementById('bc-baslik').textContent = d.baslik ? d.baslik.substring(0, 40) + (d.baslik.length > 40 ? '…' : '') : 'Detay';

    document.getElementById('page-content').innerHTML = `

      <!-- HEADER KARTI -->
      <div class="detay-header">
        <div class="detay-eyebrow">EKAP #${d.ekap_id || '—'} · ${d.ikn || '—'}</div>
        <div class="detay-baslik">${d.baslik || '—'}</div>
        <div class="detay-idare">📍 ${d.idare || '—'} · ${d.il || '—'}${d.ulke && d.ulke !== 'TR' ? ', ' + d.ulke : ''}</div>
        <div class="detay-badges">
          ${durumBadge(d.durum, d.son_teklif_tarihi)}
          ${d.tur ? `<span class="badge badge-tur">${d.tur}</span>` : ''}
          ${d.usul ? `<span class="badge badge-usul">${d.usul}</span>` : ''}
          ${gun !== null && gun >= 0 ? `<span class="badge badge-usul">⏱ ${gun} gün kaldı</span>` : ''}
        </div>
        <div class="detay-actions">
          <button class="btn-takip" id="main-takip" onclick="takibeAl()">☆ Takibe Al</button>
          <a class="btn-takip" href="teklif-olustur?ihale_id=${d.id}" style="background:linear-gradient(135deg,#F0A500,#C98A00);display:inline-flex;align-items:center;gap:6px;text-decoration:none;">✏ Teklif Hazırla</a>
          ${d.ikn ? `<a class="btn-ekap" href="${ekapLink(d.ikn)}" target="_blank" rel="noopener">↗ EKAP'ta Görüntüle</a>` : ''}
        </div>
      </div>

      <!-- KPI GRID -->
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-label">Yaklaşık Maliyet</div>
          <div class="kpi-value amber" style="font-size:18px;">${yaklasikMaliyet(d)}</div>
          <div class="kpi-sub">${d.itiraz_bedeli ? 'İtiraz bedeli: ' + itirazFormatla(d.itiraz_bedeli) : (d.para_birimi || 'TRY')}</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Son Teklif Tarihi</div>
          <div class="kpi-value" style="font-size:18px;">${tarihFormatla(d.son_teklif_tarihi)}</div>
          <div class="kpi-sub">${gun !== null && gun >= 0 ? gun + ' gün kaldı' : gun !== null ? 'Süresi doldu' : '—'}</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">İlan Tarihi</div>
          <div class="kpi-value" style="font-size:18px;">${tarihFormatla(d.ilan_tarihi)}</div>
          <div class="kpi-sub">Yayın tarihi</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Profil Uyumu</div>
          <div class="kpi-value amber">${uyum}%</div>
          <div class="kpi-sub">Sektör eşleşmesi</div>
        </div>
      </div>

      <!-- UYUM SKORU -->
      <div class="uyum-bar-wrap" style="margin-bottom:20px;">
        <div class="uyum-header">
          <div>
            <div class="kpi-label">Profil Uyum Skoru</div>
            <div style="font-size:13px;color:var(--muted);margin-top:4px;">Firma profilinize göre hesaplandı</div>
          </div>
          <div class="uyum-score">${uyum}%</div>
        </div>
        <div class="uyum-track">
          <div class="uyum-fill" id="uyum-fill" style="width:0%"></div>
        </div>
        <div class="uyum-tags">
          ${d.tur ? `<span class="uyum-tag">✓ ${d.tur}</span>` : ''}
          ${d.il ? `<span class="uyum-tag">✓ ${d.il}</span>` : ''}
          <span class="uyum-tag">✓ Bütçe aralığı</span>
        </div>
      </div>

      <!-- SEKMELER -->
      <div class="tabs">
        <button class="tab-btn active" onclick="sekmeAc(event,'tab-bilgi')">İhale Bilgileri</button>
        <button class="tab-btn" onclick="sekmeAc(event,'tab-ilan')">İlan Bilgileri</button>
        <button class="tab-btn" onclick="sekmeAc(event,'tab-belge')">Belgeler${belgeler.length ? ' (' + belgeler.length + ')' : ''}</button>
      </div>

      <!-- TAB: İHALE BİLGİLERİ -->
      <div class="tab-panel active" id="tab-bilgi">
        <div class="detay-grid">
          <div class="detay-card">
            <div class="card-title">İhale Bilgileri</div>
            <div class="info-row"><span class="info-label">İdare</span><span class="info-value">${d.idare || '—'}</span></div>
            <div class="info-row"><span class="info-label">İl</span><span class="info-value">${d.il || '—'}</span></div>
            <div class="info-row"><span class="info-label">İhale Türü</span><span class="info-value">${d.tur || '—'}</span></div>
            <div class="info-row"><span class="info-label">İhale Usulü</span><span class="info-value">${d.usul || '—'}</span></div>
            <div class="info-row"><span class="info-label">OKAS Kodu</span><span class="info-value">${d.okas || '—'}</span></div>
            <div class="info-row"><span class="info-label">Kaynak</span><span class="info-value">${d.kaynak ? d.kaynak.toUpperCase() : '—'}</span></div>
          </div>

          <div class="detay-card">
            <div class="card-title">Tarih & Maliyet</div>
            <div class="info-row"><span class="info-label">İlan Tarihi</span><span class="info-value">${tarihFormatla(d.ilan_tarihi)}</span></div>
            <div class="info-row"><span class="info-label">Son Teklif</span><span class="info-value">${tarihFormatla(d.son_teklif_tarihi)}</span></div>
            <div class="info-row"><span class="info-label">İhale Tarihi</span><span class="info-value">${tarihFormatla(d.ihale_tarihi)}</span></div>
            <div class="info-row"><span class="info-label">Yaklaşık Maliyet</span><span class="info-value" style="color:var(--amber);">${yaklasikMaliyet(d)}</span></div>
            <div class="info-row"><span class="info-label">İtirazen Şikayet Bedeli</span><span class="info-value">${itirazFormatla(d.itiraz_bedeli)}</span></div>
          </div>

          ${d.isin_yapilacagi_yer || d.ihale_yeri ? `
          <div class="detay-card full">
            <div class="card-title">Yer Bilgileri</div>
            ${d.isin_yapilacagi_yer ? `<div class="info-row"><span class="info-label">İşin Yapılacağı Yer</span><span class="info-value" style="max-width:70%;">${d.isin_yapilacagi_yer}</span></div>` : ''}
            ${d.ihale_yeri ? `<div class="info-row"><span class="info-label">İhale Yeri</span><span class="info-value" style="max-width:70%;">${d.ihale_yeri}</span></div>` : ''}
          </div>` : ''}
        </div>
      </div>

      <!-- TAB: İLAN BİLGİLERİ -->
      <div class="tab-panel" id="tab-ilan">
        <div class="detay-card full">
          <div class="card-title">İhale İlanı</div>
          <div class="ilan-metni">${d.ilan_metni || d.aciklama || 'İlan metni bulunamadı.'}</div>
        </div>
      </div>

      <!-- TAB: BELGELER -->
      <div class="tab-panel" id="tab-belge">
        <div class="detay-card full">
          <div class="card-title">İhale Belgeleri</div>
          ${belgeler.length ? belgeler.map((b,i) => `
            <div class="belge-item">
              <div class="belge-info">
                <span class="belge-icon">📄</span>
                <div>
                  <div class="belge-ad">İhale Dokümanı ${i+1}</div>
                  <div class="belge-tarih">${b.tarih ? tarihFormatla(b.tarih) : ''}</div>
                </div>
              </div>
              <a class="btn-ekap" href="${ekapLink(d.ikn)}" target="_blank" rel="noopener">↓ EKAP'tan İndir</a>
            </div>`).join('') : `
            <div style="color:var(--muted);font-size:13px;padding:8px 0;">
              Bu ihale için belge listesi bulunamadı. Dokümanlar EKAP'ta giriş yapılarak indirilebilir.
            </div>`}
        </div>
      </div>

      <!-- BENZER İHALELER -->
      <div class="detay-card full" id="benzer-kart" style="margin-top:20px;">
        <div class="card-title">Benzer İhaleler</div>
        <div class="benzer-list" id="benzer-list">
          <div style="color:var(--muted);font-size:13px;">Yükleniyor...</div>
        </div>
      </div>
    `;

    // Uyum bar animasyonu
    setTimeout(() => {
      const fill = document.getElementById('uyum-fill');
      if (fill) fill.style.width = uyum + '%';
    }, 200);
  }

  async function benzerIhaleler(d) {
    const { data } = await sb
      .from('ilanlar')
      .select('id, baslik, idare, yaklasik_maliyet_min, yaklasik_maliyet_max, son_teklif_tarihi')
      .eq('tur', d.tur || 'Hizmet')
      .neq('id', d.id)
      .eq('durum', 'aktif')
      .limit(4);

    const list = document.getElementById('benzer-list');
    if (!list) return;

    if (!data || data.length === 0) {
      list.innerHTML = `<div style="color:var(--muted);font-size:13px;">Benzer ihale bulunamadı.</div>`;
      return;
    }

    const aylar = ['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
    list.innerHTML = data.map(b => {
      const dt = b.son_teklif_tarihi ? new Date(b.son_teklif_tarihi) : null;
      const tarih = dt ? `${dt.getDate()} ${aylar[dt.getMonth()]} ${dt.getFullYear()}` : '—';
      const bedel = yaklasikMaliyet(b);
      return `
        <a class="benzer-item" href="ihale-detay?id=${b.id}">
          <div>
            <div class="benzer-baslik">${b.baslik}</div>
            <div class="benzer-meta">${b.idare || '—'} · Son: ${tarih}</div>
          </div>
          <div class="benzer-bedel">${bedel}</div>
        </a>`;
    }).join('');
  }

  function takibeAl() {
    takipte = !takipte;
    const btns = [document.getElementById('main-takip'), document.getElementById('topbar-takip')];
    btns.forEach(btn => {
      if (!btn) return;
      if (takipte) {
        btn.textContent = '✓ Takipte';
        btn.style.background = 'rgba(76,175,80,0.15)';
        btn.style.color = '#4CAF50';
      } else {
        btn.textContent = '☆ Takibe Al';
        btn.style.background = '';
        btn.style.color = '';
      }
    });
  }

  ihaleYukle();
</script>
</body>
</html>
